<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Pago</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light py-4">

    <div class="container">
        <div class="card mx-auto shadow-sm" style="max-width: 900px;">
            <div class="card-header bg-white py-3">
                <h2 class="h4 mb-0">Formulario de pago</h2>
            </div>
            
            <div class="card-body">
                <div id="alert-error" class="alert alert-danger d-none" role="alert">
                    Algunos campos están vacíos o son incorrectos.
                </div>

                <form id="payment-form" novalidate>
                    <div class="row g-3">
                        <div class="col-12 col-md-5">
                            <label class="form-label">Tarjeta #</label>
                            <input type="text" class="form-control" placeholder="XXXX-XXXX-XXXX-XXXX" required>
                        </div>
                        <div class="col-12 col-sm-6 col-md-3">
                            <label class="form-label">CVC #</label>
                            <input type="text" class="form-control" placeholder="000" required>
                        </div>
                        <div class="col-12 col-sm-6 col-md-4">
                            <label class="form-label">Importe</label>
                            <div class="input-group">
                                <span class="input-group-text">€</span>
                                <input type="number" class="form-control" placeholder="Importe" required>
                            </div>
                        </div>

                        <div class="col-12 col-md-6">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" required>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label">Apellidos</label>
                            <input type="text" class="form-control" required>
                        </div>

                        <div class="col-12 col-md-6">
                            <label class="form-label">País</label>
                            <input type="text" class="form-control" required>
                        </div>
                        <div class="col-12 col-sm-6 col-md-3">
                            <label class="form-label">Ciudad</label>
                            <select class="form-select" required>
                                <option selected disabled value="">Elige una ciudad</option>
                                <option>Albacete</option>
                                <option>Alicante</option>
                                <option>Almería</option>
                                <option>Ávila</option>
                                <option>Badajoz</option>
                                <option>Barcelona</option>
                                <option>Bilbao</option>
                                <option>Burgos</option>
                                <option>Cáceres</option>
                                <option>Cádiz</option>
                                <option>Castellón de la Plana</option>
                                <option>Ceuta</option>
                                <option>Ciudad Real</option>
                                <option>Córdoba</option>
                                <option>Cuenca</option>
                                <option>Girona</option>
                                <option>Granada</option>
                                <option>Guadalajara</option>
                                <option>Huelva</option>
                                <option>Huesca</option>
                                <option>Jaén</option>
                                <option>Las Palmas de Gran Canaria</option>
                                <option>León</option>
                                <option>Lleida</option>
                                <option>Logroño</option>
                                <option>Lugo</option>
                                <option>Madrid</option>
                                <option>Málaga</option>
                                <option>Melilla</option>
                                <option>Mérida</option>
                                <option>Murcia</option>
                                <option>Ourense</option>
                                <option>Oviedo</option>
                                <option>Palencia</option>
                                <option>Palma de Mallorca</option>
                                <option>Pamplona</option>
                                <option>Pontevedra</option>
                                <option>Salamanca</option>
                                <option>San Sebastián</option>
                                <option>Santander</option>
                                <option>Santiago de Compostela</option>
                                <option>Segovia</option>
                                <option>Sevilla</option>
                                <option>Soria</option>
                                <option>Tarragona</option>
                                <option>Teruel</option>
                                <option>Toledo</option>
                                <option>Valencia</option>
                                <option>Valladolid</option>
                                <option>Vitoria-Gasteiz</option>
                                <option>Zamora</option>
                                <option>Zaragoza</option>
                            </select>
                        </div>
                        <div class="col-12 col-sm-6 col-md-3">
                            <label class="form-label">Código Postal</label>
                            <input type="text" class="form-control" required>
                        </div>

                        <div class="col-12 col-md-6">
                            <label class="form-label d-block">Aceptamos:</label>
                            <div class="payment-methods-container p-2 rounded d-inline-flex align-items-center">
                                <div class="form-check form-check-inline m-0">
                                    <input class="form-check-input" type="radio" name="payment" id="mastercard" checked>
                                    <label class="form-check-label" for="mastercard"><img src="https://img.icons8.com/color/24/mastercard.png"/></label>
                                </div>
                                <div class="form-check form-check-inline m-0">
                                    <input class="form-check-input" type="radio" name="payment" id="visa">
                                    <label class="form-check-label" for="visa"><img src="https://img.icons8.com/color/24/visa.png"/></label>
                                </div>
                                <div class="form-check form-check-inline m-0">
                                    <input class="form-check-input" type="radio" name="payment" id="diners">
                                    <label class="form-check-label" for="diners"><img src="https://img.icons8.com/color/24/diners-club.png"/></label>
                                </div>
                                <div class="form-check form-check-inline m-0">
                                    <input class="form-check-input" type="radio" name="payment" id="amex">
                                    <label class="form-check-label" for="amex"><img src="https://img.icons8.com/color/24/amex.png"/></label>
                                </div>
                            </div>
                        </div>
                        
                        <div class="col-12 col-md-6">
                            <label class="form-label">Mensaje</label>
                            <textarea class="form-control" rows="3"></textarea>
                            <div class="form-text">Añade aquí cualquier nota.</div>
                        </div>
                    </div>
                </form>
            </div>

            <div class="card-footer bg-light text-end py-3">
                <button type="button" class="btn btn-secondary me-2">Cancelar</button>
                <button type="submit" form="payment-form" class="btn btn-primary px-4">Enviar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
