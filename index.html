<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Form Example</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light py-5">

    <div class="container">
        <div class="card mx-auto shadow-sm" style="max-width: 900px;">
            <div class="card-header bg-white">
                <h2 class="h4 mb-0">Payment form example</h2>
            </div>
            <div class="card-body">
                <div id="alert-error" class="alert alert-danger d-none" role="alert">
                    Some fields are missing
                </div>

                <form id="payment-form">
                    <div class="row g-3">
                        <div class="col-md-5">
                            <label class="form-label">Card #</label>
                            <input type="text" class="form-control" placeholder="XXXXXXXXXXXXXXXX" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">CVC #</label>
                            <input type="text" class="form-control" placeholder="0000" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Amount</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" class="form-control" placeholder="Amount" required>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">First Name</label>
                            <input type="text" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Last Name</label>
                            <input type="text" class="form-control" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">City</label>
                            <input type="text" class="form-control" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">State</label>
                            <select class="form-select" required>
                                <option selected disabled value="">Pick a state</option>
                                <option>California</option>
                                <option>Florida</option>
                                <option>New York</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Postal Code</label>
                            <input type="text" class="form-control" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">We accept:</label>
                            <div class="payment-methods p-2 rounded">
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="payment" id="mastercard" checked>
                                    <label class="form-check-label" for="mastercard"><img src="https://img.icons8.com/color/24/mastercard.png"/></label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="payment" id="visa">
                                    <label class="form-check-label" for="visa"><img src="https://img.icons8.com/color/24/visa.png"/></label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="payment" id="diners">
                                    <label class="form-check-label" for="diners"><img src="https://img.icons8.com/color/24/diners-club.png"/></label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="payment" id="amex">
                                    <label class="form-check-label" for="amex"><img src="https://img.icons8.com/color/24/amex.png"/></label>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Message</label>
                            <textarea class="form-control" rows="3"></textarea>
                            <div class="form-text">Add any notes here.</div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="card-footer bg-light text-end">
                <button type="button" class="btn btn-secondary">Cancel</button>
                <button type="submit" form="payment-form" class="btn btn-primary">Send</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
